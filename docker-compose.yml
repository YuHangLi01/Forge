services:
  postgres:
    image: postgres:16-alpine
    container_name: forge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - forge_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - forge_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: forge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - forge_redis_data:/data
    networks:
      - forge_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: forge_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - forge_chroma_data:/chroma/chroma
    networks:
      - forge_net
    environment:
      IS_PERSISTENT: "TRUE"
      ALLOW_RESET: "TRUE"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v2/heartbeat || curl -sf http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  forge_pg_data:
    name: forge_pg_data
  forge_redis_data:
    name: forge_redis_data
  forge_chroma_data:
    name: forge_chroma_data

networks:
  forge_net:
    name: forge_net
    driver: bridge
